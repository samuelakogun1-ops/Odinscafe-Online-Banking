<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdinCore | Global Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'JetBrains Mono', monospace; 
            background-color: #020617; 
            color: #94a3b8; 
            margin: 0; 
            min-height: 100vh;
        }
        .ledger-row {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }
        .ledger-row:hover {
            background: rgba(251, 191, 36, 0.02);
            color: white;
        }
        .status-pill {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 8px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .gold-text { color: #fbbf24; }
    </style>
</head>
<body class="p-4 md:p-12">

    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-end mb-12 border-b border-amber-500/20 pb-8">
            <div>
                <h1 class="text-2xl font-bold gold-text tracking-tighter uppercase italic">Global_Transaction_Ledger</h1>
                <p class="text-[9px] uppercase tracking-[0.4em] opacity-50">Real-Time Sovereign Asset Monitoring</p>
            </div>
            <div class="text-right">
                <p class="text-[9px] uppercase font-bold">Network Status</p>
                <p class="text-[10px] text-green-500 font-bold">ENCRYPTED // ACTIVE</p>
            </div>
        </header>

        <!-- Stats Bar -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12">
            <div class="bg-white/5 p-4 rounded-lg border border-white/5">
                <p class="text-[8px] uppercase mb-1">24h Volume</p>
                <p class="text-lg font-bold text-white">$1.2B</p>
            </div>
            <div class="bg-white/5 p-4 rounded-lg border border-white/5">
                <p class="text-[8px] uppercase mb-1">Active Wires</p>
                <p class="text-lg font-bold text-white">402</p>
            </div>
            <div class="bg-white/5 p-4 rounded-lg border border-white/5">
                <p class="text-[8px] uppercase mb-1">Avg. Latency</p>
                <p class="text-lg font-bold text-white">12ms</p>
            </div>
            <div class="bg-white/5 p-4 rounded-lg border border-white/5">
                <p class="text-[8px] uppercase mb-1">Nodes</p>
                <p class="text-lg font-bold text-white">Sovereign-Alpha</p>
            </div>
        </div>

        <!-- Ledger Table -->
        <div class="bg-black/40 rounded-xl border border-white/5 overflow-hidden">
            <div class="grid grid-cols-4 p-4 bg-white/5 text-[9px] font-bold uppercase tracking-widest border-b border-white/10">
                <div>Timestamp</div>
                <div>Origin Node</div>
                <div>Amount</div>
                <div class="text-right">Status</div>
            </div>
            <div id="ledgerContent" class="text-[10px]">
                <!-- Transactions will appear here -->
            </div>
        </div>

        <div class="mt-8 text-center">
            <a href="client%20wealth%20dashboard.html" class="text-[10px] uppercase font-bold hover:text-amber-500 transition-colors tracking-widest">Return to Wealth Dashboard</a>
        </div>
    </div>

    <script>
        const origins = ["Zurich_Vault", "Cayman_Node", "Singapore_Hub", "Dubai_Reserve", "London_Bridge", "NYC_Terminal"];
        const statuses = ["Completed", "Verifying", "Secured", "Settled"];

        function generateTransaction() {
            const ledger = document.getElementById('ledgerContent');
            const amount = (Math.random() * (950000 - 10000) + 10000).toLocaleString('en-US', { style: 'currency', currency: 'USD' });
            const origin = origins[Math.floor(Math.random() * origins.length)];
            const status = statuses[Math.floor(Math.random() * statuses.length)];
            const time = new Date().toLocaleTimeString();

            const row = document.createElement('div');
            row.className = "grid grid-cols-4 p-5 ledger-row items-center";
            row.style.opacity = "0";
            row.style.transform = "translateY(-10px)";
            
            row.innerHTML = `
                <div class="font-mono opacity-50">${time}</div>
                <div class="font-bold text-white">${origin}</div>
                <div class="gold-text font-bold">${amount}</div>
                <div class="text-right">
                    <span class="status-pill bg-amber-500/10 text-amber-500 border border-amber-500/20">${status}</span>
                </div>
            `;

            ledger.prepend(row);
            
            // Animation
            setTimeout(() => {
                row.style.opacity = "1";
                row.style.transform = "translateY(0)";
            }, 10);

            // Keep only last 15 rows
            if (ledger.children.length > 15) {
                ledger.removeChild(ledger.lastChild);
            }
        }

        // Initialize with some data
        for(let i=0; i<8; i++) {
            setTimeout(generateTransaction, i * 200);
        }

        // Add new transactions every few seconds
        setInterval(generateTransaction, 4000);
    </script>
</body>
</html>
