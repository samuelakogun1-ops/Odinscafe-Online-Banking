<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdinCore | Management Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: white; 
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, #020617 80%);
            min-h-screen;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(251, 191, 36, 0.1);
        }
        .matrix-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(251, 191, 36, 0.2);
            color: white;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            outline: none;
            transition: 0.3s;
        }
        .matrix-input:focus {
            border-color: #fbbf24;
            background: rgba(0, 0, 0, 0.5);
        }
        .btn-gold {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: #000;
            font-weight: 800;
            padding: 16px;
            border-radius: 12px;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.1em;
            transition: 0.4s;
        }
        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(251, 191, 36, 0.3);
        }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-12 border-b border-white/5 pb-8">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter uppercase">ODIN<span class="text-amber-500">_CORE</span></h1>
                <div class="flex items-center gap-3 mt-2">
                    <div id="nodeDot" class="w-2.5 h-2.5 rounded-full bg-red-500 animate-pulse"></div>
                    <span id="nodeStatus" class="text-[10px] font-bold uppercase tracking-[0.2em] text-red-500">Satellite Link: Offline</span>
                </div>
            </div>
            <div class="flex gap-4">
                <button onclick="location.reload()" class="px-6 py-2 bg-white/5 border border-white/10 rounded-full text-[10px] font-bold uppercase hover:bg-white/10 transition-all">Sync Refresh</button>
                <button onclick="window.location.href='terminal.html'" class="px-6 py-2 border border-amber-500/30 rounded-full text-[10px] font-bold uppercase text-amber-500 hover:bg-amber-500 hover:text-black transition-all">Terminal</button>
            </div>
        </header>

        <div class="grid lg:grid-cols-3 gap-10">
            <!-- Provisioning -->
            <div class="glass-panel p-8 rounded-[32px]">
                <h2 class="text-sm font-black uppercase tracking-widest mb-8 text-amber-500">Identity Provisioning</h2>
                <form id="provisionForm" class="space-y-6">
                    <div>
                        <label class="text-[10px] uppercase font-bold text-white/40 mb-2 block ml-1">Client Full Name</label>
                        <input type="text" id="clientName" class="matrix-input" placeholder="e.g. Alexander Vance" required>
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-bold text-white/40 mb-2 block ml-1">Initial Liquidity ($)</label>
                        <input type="number" id="clientBalance" class="matrix-input" placeholder="10,000,000" required>
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-bold text-white/40 mb-2 block ml-1">Vault Access Key</label>
                        <input type="text" id="clientPass" class="matrix-input" placeholder="Secure Passphrase" required>
                    </div>
                    <button type="submit" id="submitBtn" class="btn-gold w-full mt-4">Execute Provisioning</button>
                </form>
            </div>

            <!-- List -->
            <div class="lg:col-span-2 glass-panel p-8 rounded-[32px] min-h-[500px]">
                <div class="flex justify-between items-center mb-10">
                    <h2 class="text-sm font-black uppercase tracking-widest text-white">Sovereign Registry</h2>
                    <span id="recordCount" class="text-[10px] font-mono text-white/20">RECORDS: 00</span>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-[10px] uppercase text-white/30 border-b border-white/5">
                                <th class="pb-5 font-bold">Client Identity</th>
                                <th class="pb-5 font-bold">Passkey</th>
                                <th class="pb-5 font-bold">Balance</th>
                                <th class="pb-5 font-bold text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="registryList" class="divide-y divide-white/5">
                            <!-- Injected -->
                        </tbody>
                    </table>
                    <div id="emptyState" class="text-center py-24 text-white/10 text-xs uppercase tracking-[0.3em] italic">
                        Awaiting secure data handshake...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'odin-core-vault';

        async function initialize() {
            try {
                await signInAnonymously(auth);
                document.getElementById('nodeDot').className = "w-2.5 h-2.5 rounded-full bg-green-500 shadow-[0_0_15px_#22c55e]";
                document.getElementById('nodeStatus').innerText = "Satellite Link: Active";
                document.getElementById('nodeStatus').className = "text-[10px] font-bold uppercase tracking-[0.2em] text-green-500";
                
                const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'users');
                
                onSnapshot(usersRef, (snapshot) => {
                    const list = document.getElementById('registryList');
                    const empty = document.getElementById('emptyState');
                    list.innerHTML = '';
                    empty.style.display = snapshot.empty ? 'block' : 'none';
                    document.getElementById('recordCount').innerText = "RECORDS: " + (snapshot.size < 10 ? "0" + snapshot.size : snapshot.size);

                    snapshot.forEach((userDoc) => {
                        const data = userDoc.data();
                        const tr = document.createElement('tr');
                        tr.className = "hover:bg-white/[0.02] transition-colors";
                        tr.innerHTML = `
                            <td class="py-6 font-bold text-white uppercase italic text-sm">${data.name}</td>
                            <td class="py-6 text-white/40 font-mono text-[11px]">${data.password}</td>
                            <td class="py-6 text-amber-500 font-black text-sm">$${Number(data.balance).toLocaleString()}</td>
                            <td class="py-6 text-right">
                                <button onclick="window.terminate('${userDoc.id}')" class="text-[9px] font-black uppercase text-red-500 border border-red-500/20 px-3 py-1.5 rounded-lg hover:bg-red-500 hover:text-white transition-all">Terminate</button>
                            </td>
                        `;
                        list.appendChild(tr);
                    });
                });

                document.getElementById('provisionForm').onsubmit = async (e) => {
                    e.preventDefault();
                    const btn = document.getElementById('submitBtn');
                    btn.disabled = true;
                    btn.innerText = "PROVISIONING...";

                    try {
                        await addDoc(usersRef, {
                            name: document.getElementById('clientName').value,
                            balance: document.getElementById('clientBalance').value,
                            password: document.getElementById('clientPass').value,
                            timestamp: new Date().getTime()
                        });
                        document.getElementById('provisionForm').reset();
                    } catch (err) { alert("Security Breach: Transaction Denied."); }
                    btn.disabled = false;
                    btn.innerText = "Execute Provisioning";
                };

            } catch (err) { console.error("Link Error", err); }
        }

        window.terminate = async (id) => {
            if(confirm("Confirm Identity Termination?")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', id));
            }
        };

        initialize();
    </script>
</body>
</html>
