<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdinCore | Client Vault Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: white; 
            display: flex;
            align-items: center;
            justify-center;
            min-height: 100vh;
            margin: 0;
        }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-field { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); color: white; transition: 0.3s; }
        .input-field:focus { border-color: #fbbf24; background: rgba(0, 0, 0, 0.5); outline: none; }
    </style>
</head>
<body class="p-6">

    <div class="glass w-full max-w-md p-10 rounded-[3rem] shadow-2xl mx-auto">
        <div class="text-center mb-10">
            <div class="inline-flex w-12 h-12 bg-amber-500 rounded-2xl items-center justify-center font-black text-black italic text-2xl mb-4">O</div>
            <h2 class="text-2xl font-black italic tracking-tighter uppercase leading-none">CLIENT<span class="text-amber-500">VAULT</span></h2>
            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-[0.3em] mt-3">Secure Sovereign Access</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1 mb-2 block">Account Name</label>
                <input type="text" id="username" placeholder="Enter Name" class="input-field w-full rounded-2xl py-4 px-6 text-sm font-bold" required>
            </div>
            
            <div>
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1 mb-2 block">Vault Passkey</label>
                <input type="password" id="password" placeholder="••••••••••••" class="input-field w-full rounded-2xl py-4 px-6 text-sm font-bold" required>
            </div>

            <div id="errorMessage" class="hidden text-red-500 text-[10px] font-bold uppercase text-center bg-red-500/10 py-3 rounded-xl">
                Invalid Credentials
            </div>
            
            <button type="submit" id="loginBtn" class="w-full bg-amber-500 hover:bg-amber-400 text-black font-black py-5 rounded-2xl text-[10px] uppercase tracking-[0.2em] transition-all">
                Unlock Portfolio
            </button>
        </form>

        <div class="mt-10 text-center border-t border-white/5 pt-8">
            <a href="index.html" class="text-[10px] font-black text-slate-500 uppercase tracking-widest hover:text-amber-500 transition-colors">Return to Landing</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Firebase logic remains same as previous setup
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'odin-core-vault';
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        signInAnonymously(auth);

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const userInp = document.getElementById('username').value;
            const passInp = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('errorMessage');

            btn.disabled = true;
            btn.innerHTML = 'VERIFYING NODE...';
            errorDiv.classList.add('hidden');

            try {
                const querySnapshot = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'users'));
                let authenticatedUser = null;

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    if (data.name.toLowerCase() === userInp.toLowerCase() && data.password === passInp) {
                        authenticatedUser = { id: doc.id, ...data };
                    }
                });

                if (authenticatedUser) {
                    localStorage.setItem('odin_active_user', JSON.stringify(authenticatedUser));
                    btn.innerHTML = 'ACCESS GRANTED';
                    btn.classList.replace('bg-amber-500', 'bg-green-500');
                    setTimeout(() => window.location.href = 'client wealth dashboard.html', 1000);
                } else {
                    throw new Error("Invalid");
                }
            } catch (err) {
                btn.disabled = false;
                btn.innerHTML = 'Unlock Portfolio';
                errorDiv.classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
