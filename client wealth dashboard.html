<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdinCore | Client Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: white; margin: 0; min-height: 100vh; }
        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gold-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid rgba(251, 191, 36, 0.2); position: relative; overflow: hidden; }
        .gold-card::after { content: ""; position: absolute; top: -50%; right: -20%; width: 300px; height: 300px; background: radial-gradient(circle, rgba(251, 191, 36, 0.05) 0%, transparent 70%); }
    </style>
</head>
<body class="flex flex-col lg:flex-row">
    <!-- Sidebar -->
    <aside class="w-full lg:w-72 flex flex-col p-8 glass-panel lg:h-screen sticky top-0">
        <div class="flex items-center gap-3 mb-12">
            <div class="w-10 h-10 bg-amber-500 rounded-xl flex items-center justify-center font-black text-black italic text-xl">O</div>
            <h2 class="text-lg font-black italic tracking-tighter uppercase leading-none">ODINCORE</h2>
        </div>
        <nav class="space-y-2 flex-grow">
            <a href="dashboard.html" class="flex items-center gap-4 px-5 py-4 bg-amber-500/10 text-amber-500 rounded-2xl font-bold text-xs uppercase tracking-widest border border-amber-500/20">Dashboard</a>
            <a href="#" class="flex items-center gap-4 px-5 py-4 text-slate-400 rounded-2xl font-bold text-xs uppercase tracking-widest">Portfolio</a>
            <a href="index.html" class="flex items-center gap-4 px-5 py-4 text-red-400 hover:bg-red-400/10 rounded-2xl font-bold text-xs uppercase tracking-widest mt-20">Lock Vault</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-grow p-6 lg:p-12">
        <header class="mb-12">
            <h1 class="text-3xl font-black italic tracking-tighter uppercase">Welcome, <span class="text-amber-500">Excellency</span></h1>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.3em] mt-2">Account: OD-7729-001X</p>
        </header>

        <div class="gold-card p-10 rounded-[3rem] mb-12 shadow-2xl">
            <p class="text-[10px] text-amber-500/70 font-bold uppercase tracking-[0.4em] mb-4">Total Liquidity</p>
            <h2 class="text-5xl md:text-7xl font-black italic tracking-tighter">$4,280,950.00</h2>
        </div>

        <div class="glass-panel p-8 rounded-[2.5rem]">
            <h3 class="text-xs font-black text-slate-500 uppercase tracking-[0.4em] mb-6">Recent Activity</h3>
            <div class="flex justify-between items-center py-4 border-b border-white/5">
                <span class="text-sm font-bold">Transfer Inbound</span>
                <span class="text-lg font-black text-green-500">+$250,000.00</span>
            </div>
            <div class="flex justify-between items-center py-4">
                <span class="text-sm font-bold">Payment Terminal</span>
                <span class="text-lg font-black text-red-400">-$12,400.00</span>
            </div>
        </div>
    </main>
</body>
</html>
