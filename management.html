<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdinCore | Account Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: white; margin: 0; min-height: 100vh; }
        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-box { background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.1); outline: none; transition: 0.3s; }
        .input-box:focus { border-color: #fbbf24; }
    </style>
</head>
<body class="p-6 lg:p-12">
    <header class="flex justify-between items-center mb-12">
        <div>
            <h1 class="text-3xl font-black italic tracking-tighter uppercase">Account <span class="text-amber-500">Matrix</span></h1>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-2">Manage Client Liquidity & Credentials</p>
        </div>
        <a href="terminal.html" class="px-6 py-3 rounded-xl border border-white/10 text-[10px] font-bold uppercase tracking-widest hover:bg-white/5 transition-all">Back to Terminal</a>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Add New User -->
        <div class="glass-panel p-8 rounded-[2.5rem]">
            <h3 class="text-xs font-black text-amber-500 uppercase tracking-widest mb-6">Provision New Node</h3>
            <form class="space-y-4">
                <input type="text" placeholder="Legal Name" class="input-box w-full rounded-xl py-4 px-5 text-xs font-bold">
                <input type="text" placeholder="Email Address" class="input-box w-full rounded-xl py-4 px-5 text-xs font-bold">
                <input type="number" placeholder="Initial Balance ($)" class="input-box w-full rounded-xl py-4 px-5 text-xs font-bold">
                <button type="button" class="w-full bg-amber-500 text-black font-black py-4 rounded-xl text-[10px] uppercase tracking-widest hover:bg-amber-400 transition-all">Create Account</button>
            </form>
        </div>

        <!-- User List -->
        <div class="lg:col-span-2 glass-panel p-8 rounded-[2.5rem]">
            <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-6">Active Clients</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-[10px] text-slate-600 uppercase tracking-widest border-b border-white/5">
                            <th class="pb-4">Client</th>
                            <th class="pb-4">Status</th>
                            <th class="pb-4 text-right">Balance</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm font-bold">
                        <tr class="border-b border-white/5">
                            <td class="py-6">
                                <p>Excellency O.</p>
                                <p class="text-[9px] text-slate-500 uppercase">OD-7729-001X</p>
                            </td>
                            <td><span class="text-[9px] px-2 py-1 bg-green-500/10 text-green-500 rounded-md">VERIFIED</span></td>
                            <td class="text-right text-amber-500">$4,280,950.00</td>
                        </tr>
                        <tr>
                            <td class="py-6">
                                <p>Imperial Holding</p>
                                <p class="text-[9px] text-slate-500 uppercase">OD-1102-099P</p>
                            </td>
                            <td><span class="text-[9px] px-2 py-1 bg-amber-500/10 text-amber-500 rounded-md">PENDING</span></td>
                            <td class="text-right text-amber-500">$12,400,000.00</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
