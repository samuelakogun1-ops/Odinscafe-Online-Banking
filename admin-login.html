<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdinCore | Admin Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'JetBrains Mono', monospace; 
            background-color: #000; 
            color: #fbbf24; 
            display: flex;
            align-items: center;
            justify-center;
            min-height: 100vh;
            margin: 0;
        }
        .terminal-border { 
            border: 1px solid rgba(251, 191, 36, 0.3); 
            background: rgba(10, 10, 10, 0.9);
            box-shadow: 0 0 40px rgba(251, 191, 36, 0.1);
        }
        .input-term {
            background: rgba(251, 191, 36, 0.05);
            border: 1px solid rgba(251, 191, 36, 0.2);
            color: #fbbf24;
            outline: none;
        }
        .input-term:focus {
            border-color: #fbbf24;
            background: rgba(251, 191, 36, 0.1);
        }
        .glitch-text { text-shadow: 0 0 8px rgba(251, 191, 36, 0.5); }
    </style>
</head>
<body class="p-6">

    <div class="terminal-border w-full max-w-md p-10 rounded-lg mx-auto relative overflow-hidden">
        <!-- Scanline effect -->
        <div class="absolute inset-0 pointer-events-none opacity-10 bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.25)_50%),linear-gradient(90deg,rgba(255,0,0,0.06),rgba(0,255,0,0.02),rgba(0,0,255,0.06))] z-50"></div>
        
        <div class="text-center mb-10">
            <h2 class="text-xl font-bold tracking-widest uppercase glitch-text">ADMIN<span class="text-white">_OVERRIDE</span></h2>
            <p class="text-[9px] opacity-50 mt-2 uppercase tracking-[0.4em]">Sovereign Node Protocol v4.0.1</p>
        </div>

        <form id="adminLoginForm" class="space-y-6">
            <div>
                <label class="text-[10px] uppercase tracking-widest mb-2 block">System Identifier</label>
                <input type="text" id="adminUser" placeholder="ROOT" class="input-term w-full py-4 px-6 text-xs font-bold" required>
            </div>
            
            <div>
                <label class="text-[10px] uppercase tracking-widest mb-2 block">Access Key</label>
                <input type="password" id="adminPass" placeholder="••••••••" class="input-term w-full py-4 px-6 text-xs font-bold" required>
            </div>

            <div id="errorMsg" class="hidden text-red-500 text-[10px] font-bold uppercase text-center border border-red-500/20 py-3">
                ACCESS_DENIED: UNAUTHORIZED_NODE
            </div>
            
            <button type="submit" id="submitBtn" class="w-full bg-amber-500 text-black font-bold py-5 text-[10px] uppercase tracking-[0.3em] hover:bg-white transition-all">
                Execute Boot Sequence
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-amber-500/10 text-center">
            <p class="text-[8px] opacity-30 uppercase">Warning: Unauthorized access is logged by IP</p>
        </div>
    </div>

    <script>
        document.getElementById('adminLoginForm').onsubmit = function(e) {
            e.preventDefault();
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;
            const btn = document.getElementById('submitBtn');
            const error = document.getElementById('errorMsg');

            btn.innerHTML = "INITIALIZING...";
            error.classList.add('hidden');

            // Admin Credentials
            if(user === "admin" && pass === "odin77") {
                btn.innerHTML = "AUTHENTICATED";
                btn.style.backgroundColor = "#22c55e";
                setTimeout(() => {
                    window.location.href = 'terminal.html';
                }, 1000);
            } else {
                setTimeout(() => {
                    btn.innerHTML = "Execute Boot Sequence";
                    error.classList.remove('hidden');
                }, 800);
            }
        };
    </script>
</body>
</html>
