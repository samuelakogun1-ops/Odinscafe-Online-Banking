<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdinCore | Sovereign Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains Mono', monospace; background-color: #020617; color: #fbbf24; }
        .glass-panel { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(251, 191, 36, 0.2); }
        .matrix-input { background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(251, 191, 36, 0.3); color: white; padding: 12px; border-radius: 4px; width: 100%; outline: none; }
        .btn-gold { background: #fbbf24; color: #000; font-weight: 800; padding: 12px; border-radius: 4px; text-transform: uppercase; font-size: 10px; width: 100%; transition: 0.3s; }
        .btn-gold:hover { background: white; transform: scale(1.02); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-white/10 pb-6">
            <div>
                <h1 class="text-2xl font-black italic">ODIN_MATRIX</h1>
                <div class="flex items-center gap-3 mt-2">
                    <div id="statusDot" class="w-3 h-3 rounded-full bg-red-600 animate-pulse"></div>
                    <span id="statusText" class="text-[10px] font-bold uppercase text-red-500">Node: Local Cache Active (Connecting...)</span>
                </div>
            </div>
            <button onclick="window.location.href='terminal.html'" class="text-[10px] border border-white/20 px-4 py-2 hover:bg-white/10">Back</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="glass-panel p-6 rounded-lg">
                <h2 class="text-[10px] font-bold uppercase mb-6 text-white italic border-l-2 border-amber-500 pl-3">Provisioning</h2>
                <form id="pForm" class="space-y-4">
                    <input type="text" id="pName" class="matrix-input" placeholder="FULL NAME" required>
                    <input type="number" id="pBal" class="matrix-input" placeholder="BALANCE ($)" required>
                    <input type="text" id="pPass" class="matrix-input" placeholder="PASSKEY" required>
                    <button type="submit" id="pBtn" class="btn-gold">Execute Provisioning</button>
                </form>
            </div>

            <div class="lg:col-span-2 glass-panel p-6 rounded-lg min-h-[400px]">
                <table class="w-full text-left text-[11px]">
                    <thead class="text-white/30 uppercase border-b border-white/5">
                        <tr><th class="pb-4">Identity</th><th class="pb-4">Passkey</th><th class="pb-4">Liquidity</th><th class="pb-4 text-right">Action</th></tr>
                    </thead>
                    <tbody id="pTable"></tbody>
                </table>
                <div id="emptyMsg" class="text-center py-20 text-white/10 text-[10px] uppercase">Connecting to global registry...</div>
            </div>
        </div>

        <div class="mt-8 bg-black/80 p-4 border border-white/5 rounded font-mono text-[9px] text-slate-500 overflow-y-auto max-h-32" id="logs">
            <p>> System Initialization Started...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const log = (m, c='slate-500') => {
            const l = document.getElementById('logs');
            l.innerHTML += `<p class="text-${c}">[${new Date().toLocaleTimeString()}] > ${m}</p>`;
            l.scrollTop = l.scrollHeight;
        }

        async function start() {
            try {
                // FORCE RE-FETCH CONFIG
                const config = JSON.parse(__firebase_config);
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'odin-core-vault';
                const app = initializeApp(config);
                const db = getFirestore(app);
                const auth = getAuth(app);

                log("Attempting Secure Auth...", "white");
                const cred = await signInAnonymously(auth);
                log("Auth Verified: " + cred.user.uid, "green-500");

                document.getElementById('statusDot').className = "w-3 h-3 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]";
                document.getElementById('statusText').innerText = "NODE: ONLINE (ENCRYPTED)";
                document.getElementById('statusText').className = "text-[10px] font-bold uppercase text-green-500";

                const col = collection(db, 'artifacts', appId, 'public', 'data', 'users');
                
                onSnapshot(col, (snap) => {
                    const table = document.getElementById('pTable');
                    document.getElementById('emptyMsg').style.display = snap.empty ? 'block' : 'none';
                    table.innerHTML = '';
                    snap.forEach((d) => {
                        const u = d.data();
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td class="py-4 font-bold text-white uppercase italic">${u.name}</td>
                            <td class="py-4 opacity-40">${u.password}</td>
                            <td class="py-4 text-amber-500 font-bold">$${Number(u.balance).toLocaleString()}</td>
                            <td class="py-4 text-right"><button onclick="window.purge('${d.id}')" class="text-red-500 font-bold text-[8px]">DELETE</button></td>
                        `;
                        table.appendChild(tr);
                    });
                    log("Registry Synchronized.", "green-500");
                });

                document.getElementById('pForm').onsubmit = async (e) => {
                    e.preventDefault();
                    log("Transmitting Provisioning Data...");
                    await addDoc(col, {
                        name: document.getElementById('pName').value,
                        balance: document.getElementById('pBal').value,
                        password: document.getElementById('pPass').value
                    });
                    log("Identity Confirmed.", "green-500");
                    document.getElementById('pForm').reset();
                };

                window.purge = (id) => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', id));

            } catch (err) {
                log("NODE ERROR: " + err.message, "red-500");
            }
        }

        // Run immediately
        start();
    </script>
</body>
</html>
