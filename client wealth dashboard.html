<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdinCore | Wealth Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: white; margin: 0; min-height: 100vh; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; }
        .nav-link { transition: all 0.3s ease; border-bottom: 2px solid transparent; }
        .nav-link:hover { border-color: #fbbf24; color: #fbbf24; }
    </style>
</head>
<body class="p-4 md:p-8 lg:p-12">

    <!-- Top Navigation -->
    <nav class="flex justify-between items-center mb-12">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-amber-500 rounded-xl flex items-center justify-center font-black text-black italic text-xl">O</div>
            <span class="font-black italic tracking-tighter text-xl uppercase">ODIN<span class="text-amber-500">CORE</span></span>
        </div>
        <div class="flex gap-6 items-center">
            <span id="systemTime" class="text-[10px] font-mono text-slate-500 hidden md:block"></span>
            <button onclick="logout()" class="text-[10px] font-bold uppercase tracking-widest text-red-500 hover:opacity-70">Logout</button>
        </div>
    </nav>

    <!-- Welcome Header -->
    <header class="mb-12">
        <h1 class="text-3xl md:text-5xl font-black italic tracking-tighter uppercase leading-none mb-4">
            Welcome, <span id="userNameDisplay" class="text-amber-500">CLIENT</span>
        </h1>
        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.3em]">Sovereign Wealth Management Interface</p>
    </header>

    <!-- Main Stats -->
    <div class="stats-grid mb-8">
        <div class="glass-card p-8 rounded-[2.5rem]">
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Total Liquidity</p>
            <h2 id="userBalanceDisplay" class="text-4xl font-black italic text-white tracking-tighter leading-none mb-2">
                $0.00
            </h2>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                <span class="text-[9px] font-bold text-green-500 uppercase">Settled Portfolio</span>
            </div>
        </div>

        <div class="glass-card p-8 rounded-[2.5rem]">
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Active Protocol</p>
            <h2 class="text-xl font-bold text-white tracking-tight uppercase">Quantum-Hedge v4</h2>
            <p class="text-[9px] font-bold text-slate-500 uppercase mt-4">Security Level: Level 5 Sovereign</p>
        </div>
    </div>

    <!-- Quick Actions -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="glass-card p-8 rounded-[2.5rem]">
            <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-6">Capital Controls</h3>
            <div class="grid grid-cols-2 gap-4">
                <a href="client%20transfer%20portal.html" class="flex flex-col items-center justify-center p-6 rounded-3xl bg-white/5 hover:bg-amber-500 hover:text-black transition-all group">
                    <span class="text-[10px] font-black uppercase tracking-widest">Wire Transfer</span>
                </a>
                <a href="global%20transaction.html" class="flex flex-col items-center justify-center p-6 rounded-3xl bg-white/5 hover:bg-white/10 transition-all">
                    <span class="text-[10px] font-black uppercase tracking-widest">Live Ledger</span>
                </a>
            </div>
        </div>

        <div class="glass-card p-8 rounded-[2.5rem]">
            <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-6">Security Node</h3>
            <div class="space-y-4">
                <div class="flex justify-between items-center text-[10px] font-bold">
                    <span class="text-slate-500 uppercase">IP Address:</span>
                    <span class="text-white">ENCRYPTED</span>
                </div>
                <div class="flex justify-between items-center text-[10px] font-bold">
                    <span class="text-slate-500 uppercase">Access Token:</span>
                    <span class="text-amber-500 font-mono" id="tokenDisplay">---</span>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'odin-core-vault';
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Security Guard: Check if user logged in
        const userData = JSON.parse(localStorage.getItem('odin_active_user'));
        
        if (!userData) {
            window.location.href = 'login.html';
        } else {
            document.getElementById('userNameDisplay').innerText = userData.name;
            document.getElementById('tokenDisplay').innerText = userData.id.substring(0, 12).toUpperCase();
            
            // LIVE BALANCE SYNC (Rule 1 & Rule 3)
            const userDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', userData.id);
            onSnapshot(userDocRef, (doc) => {
                if (doc.exists()) {
                    const latestData = doc.data();
                    document.getElementById('userBalanceDisplay').innerText = `$${Number(latestData.balance).toLocaleString()}`;
                }
            });
        }

        // Clock logic
        setInterval(() => {
            const now = new Date();
            document.getElementById('systemTime').innerText = `NODE TIME: ${now.toLocaleTimeString()} | UTC -4`;
        }, 1000);

        window.logout = () => {
            localStorage.removeItem('odin_active_user');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
