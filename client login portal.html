<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdinCore | Client Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .login-card { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            width: 100%; 
            max-width: 420px; 
            border-radius: 2.5rem; 
            padding: 3.5rem; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6); 
        }
        .input-field {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: #fbbf24;
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.1);
        }
    </style>
</head>
<body>

    <div class="login-card text-center">
        <div class="w-20 h-20 bg-amber-500 rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-2xl shadow-amber-500/30">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-black" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
        </div>

        <h1 class="text-3xl font-black tracking-tighter uppercase italic">Client <span class="text-amber-500">Portal</span></h1>
        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.4em] mt-3 mb-12">Authorized Access Only</p>
        
        <div class="space-y-5">
            <div class="text-left">
                <label class="text-[9px] font-black text-slate-500 uppercase tracking-widest ml-1 mb-2 block">Client Email</label>
                <input type="email" id="userEmail" placeholder="vault@client.com" class="input-field w-full rounded-2xl p-5 text-sm font-bold outline-none text-white placeholder:text-slate-700 uppercase tracking-widest">
            </div>

            <div class="text-left">
                <label class="text-[9px] font-black text-slate-500 uppercase tracking-widest ml-1 mb-2 block">Secure Key</label>
                <input type="password" id="userPass" placeholder="••••••••" class="input-field w-full rounded-2xl p-5 text-sm font-bold outline-none text-white placeholder:text-slate-700">
            </div>

            <button onclick="handleLogin()" class="w-full bg-amber-500 hover:bg-amber-400 text-black font-black py-5 rounded-2xl text-xs uppercase tracking-[0.2em] transition-all shadow-xl shadow-amber-500/10 active:scale-95 mt-4">
                Verify Identity
            </button>
        </div>

        <div class="mt-10">
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">
                New Prospect? <a href="register.html" class="text-amber-500 hover:underline">Apply for Entry</a>
            </p>
            <a href="index.html" class="inline-block mt-8 text-[9px] font-bold text-slate-600 hover:text-slate-400 uppercase tracking-widest transition-colors italic">Return to Landing</a>
        </div>
    </div>

    <script>
        function handleLogin() {
            // For now, we allow access to the dashboard to show the flow
            window.location.href = "user dashboard.html";
        }
    </script>
</body>
</html>
