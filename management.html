<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdinCore | Management Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains Mono', monospace; background-color: #050505; color: #fbbf24; }
        .matrix-border { border: 1px solid rgba(251, 191, 36, 0.2); background: rgba(0, 0, 0, 0.9); }
        .input-field { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(251, 191, 36, 0.3); color: white; padding: 12px; border-radius: 6px; width: 100%; outline: none; }
        .status-light { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-amber-500/20 pb-6">
            <div>
                <h1 class="text-2xl font-black italic">CLIENT_MATRIX</h1>
                <div class="flex items-center gap-3 mt-2">
                    <span id="nodeLight" class="status-light bg-red-600"></span>
                    <span id="nodeText" class="text-[10px] font-bold uppercase tracking-widest text-red-500">Node: Disconnected</span>
                    <button id="manualConnect" class="bg-amber-500/10 border border-amber-500/40 px-3 py-1 rounded text-[8px] font-bold text-white uppercase hover:bg-amber-500 hover:text-black">Manual Override</button>
                </div>
            </div>
            <button onclick="window.location.href='terminal.html'" class="text-[10px] border border-amber-500/30 px-6 py-2 hover:bg-amber-500 font-bold uppercase">Back</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Provisioning Form -->
            <div class="matrix-border p-6 rounded-xl">
                <h2 class="text-xs font-bold uppercase tracking-widest mb-6 text-white italic">Create Account</h2>
                <form id="pForm" class="space-y-4">
                    <input type="text" id="pName" class="input-field" placeholder="Client Name" required>
                    <input type="number" id="pBal" class="input-field" placeholder="Initial Balance" required>
                    <input type="text" id="pPass" class="input-field" placeholder="Client Password" required>
                    <button type="submit" id="pBtn" class="w-full bg-amber-500 text-black font-black py-4 rounded text-[10px] uppercase tracking-widest shadow-[0_0_15px_rgba(251,191,36,0.3)]">
                        Provision Identity
                    </button>
                </form>
            </div>

            <!-- Table -->
            <div class="lg:col-span-2 matrix-border p-6 rounded-xl min-h-[400px]">
                <table class="w-full text-left text-[11px]">
                    <thead class="opacity-40 uppercase border-b border-white/5">
                        <tr><th class="pb-4">Name</th><th class="pb-4">Password</th><th class="pb-4">Balance</th><th class="pb-4 text-right">Action</th></tr>
                    </thead>
                    <tbody id="pList" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const config = JSON.parse(__firebase_config);
        const app = initializeApp(config);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'odin-core-vault';

        async function connect() {
            try {
                const res = await signInAnonymously(auth);
                document.getElementById('nodeLight').className = "status-light bg-green-500 shadow-[0_0_10px_#22c55e]";
                document.getElementById('nodeText').innerText = "Node: Connected (" + res.user.uid.substring(0,6) + ")";
                document.getElementById('nodeText').className = "text-[10px] font-bold uppercase tracking-widest text-green-500";
                sync();
            } catch (e) {
                console.error(e);
                document.getElementById('nodeText').innerText = "Retry Required";
            }
        }

        function sync() {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'users'), (snap) => {
                const list = document.getElementById('pList');
                list.innerHTML = '';
                snap.forEach((d) => {
                    const u = d.data();
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="py-4 font-bold text-white uppercase">${u.name}</td>
                        <td class="py-4 opacity-50">${u.password}</td>
                        <td class="py-4 text-amber-500 font-bold">$${Number(u.balance).toLocaleString()}</td>
                        <td class="py-4 text-right"><button onclick="del('${d.id}')" class="text-red-500 text-[9px] font-black">DEL</button></td>
                    `;
                    list.appendChild(tr);
                });
            });
        }

        document.getElementById('pForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('pBtn');
            btn.disabled = true; btn.innerText = "EXECUTING...";
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'users'), {
                    name: document.getElementById('pName').value,
                    balance: document.getElementById('pBal').value,
                    password: document.getElementById('pPass').value
                });
                document.getElementById('pForm').reset();
            } catch(err) { alert("Provisioning failed. Is the node light green?"); }
            btn.disabled = false; btn.innerText = "Provision Identity";
        };

        window.del = (id) => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', id));
        document.getElementById('manualConnect').onclick = connect;
        
        // Auto-run on load
        connect();
    </script>
</body>
</html>
