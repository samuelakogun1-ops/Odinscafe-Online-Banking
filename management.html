<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdinCore | Client Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains Mono', monospace; background-color: #050505; color: #fbbf24; }
        .matrix-border { border: 1px solid rgba(251, 191, 36, 0.2); background: rgba(0, 0, 0, 0.8); }
        .input-matrix { background: rgba(251, 191, 36, 0.05); border: 1px solid rgba(251, 191, 36, 0.2); color: white; padding: 12px; border-radius: 8px; width: 100%; outline: none; }
        .input-matrix:focus { border-color: #fbbf24; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-amber-500/20 pb-6">
            <div>
                <h1 class="text-2xl font-black tracking-tighter uppercase italic">CLIENT<span class="text-white">_MATRIX</span></h1>
                <div class="flex items-center gap-2 mt-2">
                    <div id="dbStatus" class="w-2 h-2 rounded-full bg-red-500"></div>
                    <p id="statusText" class="text-[8px] uppercase tracking-[0.3em] opacity-50">Connecting to Node...</p>
                </div>
            </div>
            <button onclick="window.location.href='terminal.html'" class="text-[10px] border border-amber-500/30 px-6 py-2 hover:bg-amber-500 hover:text-black transition-all font-bold uppercase">Return to Terminal</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Provisioning Form -->
            <div class="matrix-border p-8 rounded-2xl">
                <h2 class="text-xs font-bold uppercase tracking-widest mb-6 border-b border-amber-500/10 pb-2 text-white">Provision New Identity</h2>
                <form id="provisionForm" class="space-y-4">
                    <div>
                        <label class="text-[9px] uppercase opacity-50 mb-1 block">Full Name</label>
                        <input type="text" id="newName" class="input-matrix" placeholder="John Doe" required>
                    </div>
                    <div>
                        <label class="text-[9px] uppercase opacity-50 mb-1 block">Initial Liquidity ($)</label>
                        <input type="number" id="newBalance" class="input-matrix" placeholder="500000" required>
                    </div>
                    <div>
                        <label class="text-[9px] uppercase opacity-50 mb-1 block">Vault Passkey</label>
                        <input type="text" id="newPass" class="input-matrix" placeholder="Pass123" required>
                    </div>
                    <button type="submit" id="submitBtn" class="w-full bg-amber-500 text-black font-bold py-4 rounded-lg text-[10px] uppercase tracking-widest mt-4 hover:bg-white transition-all disabled:opacity-50">
                        Execute Provisioning
                    </button>
                </form>
            </div>

            <!-- Client List -->
            <div class="lg:col-span-2 matrix-border p-8 rounded-2xl">
                <h2 class="text-xs font-bold uppercase tracking-widest mb-6 border-b border-amber-500/10 pb-2 text-white">Active Node Registry</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-[10px]">
                        <thead>
                            <tr class="opacity-40 uppercase tracking-widest border-b border-white/5">
                                <th class="pb-4">Identity</th>
                                <th class="pb-4">Passkey</th>
                                <th class="pb-4">Liquidity</th>
                                <th class="pb-4 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="userList" class="divide-y divide-white/5">
                            <!-- Users Load Here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'odin-core-vault';
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;

        // Rule 3: Auth First
        signInAnonymously(auth).catch(console.error);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('dbStatus').className = "w-2 h-2 rounded-full bg-green-500";
                document.getElementById('statusText').innerText = "Node Connection: Established";
                loadUsers();
            }
        });

        // Load Users with Live Sync
        function loadUsers() {
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'users');
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('userList');
                list.innerHTML = '';
                snapshot.forEach((userDoc) => {
                    const data = userDoc.data();
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-white/5 transition-colors";
                    tr.innerHTML = `
                        <td class="py-4 font-bold text-white">${data.name}</td>
                        <td class="py-4 opacity-60">${data.password}</td>
                        <td class="py-4 text-amber-500 font-bold">$${Number(data.balance).toLocaleString()}</td>
                        <td class="py-4 text-right">
                            <button onclick="deleteUser('${userDoc.id}')" class="text-red-500 hover:text-white uppercase font-bold text-[8px]">Terminate</button>
                        </td>
                    `;
                    list.appendChild(tr);
                });
            }, (error) => {
                console.error("Snapshot error:", error);
            });
        }

        // Provision User
        document.getElementById('provisionForm').onsubmit = async (e) => {
            e.preventDefault();
            if (!currentUser) {
                alert("System not ready. Please wait for node connection.");
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "PROCESSING...";

            const userData = {
                name: document.getElementById('newName').value,
                balance: document.getElementById('newBalance').value,
                password: document.getElementById('newPass').value,
                createdAt: new Date().toISOString()
            };

            try {
                // Rule 1: Correct Path
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'users'), userData);
                document.getElementById('provisionForm').reset();
                btn.innerText = "EXECUTE PROVISIONING";
                btn.disabled = false;
            } catch (err) {
                console.error("Error adding user:", err);
                btn.innerText = "ERROR - RETRYING";
                btn.disabled = false;
            }
        };

        // Delete User
        window.deleteUser = async (id) => {
            if(confirm("Confirm deletion of this identity?")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', id));
            }
        };
    </script>
</body>
</html>
