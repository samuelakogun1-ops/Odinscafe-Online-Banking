<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdinCore | Global Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains Mono', monospace; background-color: #020617; color: #fbbf24; }
        .ledger-row { border-bottom: 1px solid rgba(251, 191, 36, 0.1); }
    </style>
</head>
<body class="p-6 md:p-12">
    <header class="flex justify-between items-center mb-12">
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter uppercase">GLOBAL<span class="text-white">LEDGER</span></h1>
            <p class="text-[9px] uppercase tracking-[0.4em] opacity-60">Real-time Node Propagation</p>
        </div>
        <a href="client%20wealth%20dashboard.html" class="px-6 py-2 border border-amber-500/30 text-[10px] uppercase font-bold tracking-widest hover:bg-amber-500 hover:text-black transition-all">Back to Vault</a>
    </header>

    <div class="bg-black/40 border border-white/5 rounded-3xl overflow-hidden">
        <div class="grid grid-cols-4 p-4 bg-amber-500/5 text-[9px] font-bold uppercase tracking-widest opacity-40">
            <div>Timestamp</div>
            <div>Beneficiary</div>
            <div>Reference</div>
            <div class="text-right">Amount</div>
        </div>
        <div id="ledgerBody" class="divide-y divide-white/5">
            <!-- Wires will appear here -->
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'odin-core-vault';
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'transfers'), (snapshot) => {
            const body = document.getElementById('ledgerBody');
            body.innerHTML = '';
            snapshot.forEach(doc => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = "grid grid-cols-4 p-6 text-[11px] items-center ledger-row";
                div.innerHTML = `
                    <div class="opacity-50">#${doc.id.substring(0,6)}</div>
                    <div class="font-bold text-white uppercase">${data.recipient}</div>
                    <div class="opacity-40 text-[9px]">${data.iban}</div>
                    <div class="text-right font-bold text-amber-500">+$${Number(data.amount).toLocaleString()}</div>
                `;
                body.prepend(div);
            });
        });
    </script>
</body>
</html>
