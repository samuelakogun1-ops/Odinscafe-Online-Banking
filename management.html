<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdinCore | Sovereign Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: white; 
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, #020617 80%);
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(251, 191, 36, 0.1);
        }
        .matrix-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(251, 191, 36, 0.2);
            color: white;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            outline: none;
        }
        .btn-gold {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: #000;
            font-weight: 800;
            padding: 16px;
            border-radius: 12px;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.1em;
            transition: 0.4s;
        }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(251, 191, 36, 0.3); }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-12 border-b border-white/5 pb-8">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter uppercase">ODIN<span class="text-amber-500">_CORE</span></h1>
                <div class="flex items-center gap-3 mt-2">
                    <div id="nodeDot" class="w-2.5 h-2.5 rounded-full bg-red-500 animate-pulse"></div>
                    <span id="nodeStatus" class="text-[10px] font-bold uppercase tracking-[0.2em] text-red-500">System Link: Offline</span>
                </div>
            </div>
            <button onclick="window.location.href='index.html'" class="px-6 py-2 border border-white/20 rounded-full text-[10px] font-bold uppercase text-white hover:bg-white/10 transition-all">Exit Terminal</button>
        </header>

        <div class="grid lg:grid-cols-3 gap-10">
            <div class="glass-panel p-8 rounded-[32px]">
                <h2 class="text-sm font-black uppercase mb-8 text-amber-500">Provision Client</h2>
                <form id="pForm" class="space-y-6">
                    <input type="text" id="n" class="matrix-input" placeholder="Client Name" required>
                    <input type="number" id="b" class="matrix-input" placeholder="Balance ($)" required>
                    <input type="text" id="p" class="matrix-input" placeholder="Vault Key" required>
                    <button type="submit" id="sBtn" class="btn-gold w-full">Execute Provisioning</button>
                </form>
            </div>

            <div class="lg:col-span-2 glass-panel p-8 rounded-[32px] min-h-[500px]">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-[10px] uppercase text-white/30 border-b border-white/5">
                            <th class="pb-5">Identity</th>
                            <th class="pb-5">Key</th>
                            <th class="pb-5">Balance</th>
                            <th class="pb-5 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="pList"></tbody>
                </table>
                <div id="loader" class="text-center py-24 text-white/10 text-xs uppercase italic tracking-widest">Awaiting Link...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const cfg = JSON.parse(__firebase_config);
        const app = initializeApp(cfg);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const aid = typeof __app_id !== 'undefined' ? __app_id : 'odin-core-vault';

        async function init() {
            try {
                await signInAnonymously(auth);
                document.getElementById('nodeDot').className = "w-2.5 h-2.5 rounded-full bg-green-500 shadow-[0_0_15px_#22c55e]";
                document.getElementById('nodeStatus').innerText = "System Link: Online";
                document.getElementById('nodeStatus').className = "text-[10px] font-bold uppercase tracking-[0.2em] text-green-500";
                
                const col = collection(db, 'artifacts', aid, 'public', 'data', 'users');
                onSnapshot(col, (s) => {
                    const l = document.getElementById('pList');
                    document.getElementById('loader').style.display = 'none';
                    l.innerHTML = '';
                    s.forEach((d) => {
                        const r = d.data();
                        const tr = document.createElement('tr');
                        tr.className = "border-b border-white/5";
                        tr.innerHTML = `
                            <td class="py-6 font-bold uppercase italic text-sm">${r.name}</td>
                            <td class="py-6 text-white/40 font-mono text-[11px]">${r.password}</td>
                            <td class="py-6 text-amber-500 font-black text-sm">$${Number(r.balance).toLocaleString()}</td>
                            <td class="py-6 text-right"><button onclick="window.del('${d.id}')" class="text-red-500 text-[9px] font-bold border border-red-500/20 px-2 py-1 rounded">TERM</button></td>
                        `;
                        l.appendChild(tr);
                    });
                });

                document.getElementById('pForm').onsubmit = async (e) => {
                    e.preventDefault();
                    await addDoc(col, { name: document.getElementById('n').value, balance: document.getElementById('b').value, password: document.getElementById('p').value });
                    document.getElementById('pForm').reset();
                };
            } catch (e) { console.error(e); }
        }
        window.del = (id) => deleteDoc(doc(db, 'artifacts', aid, 'public', 'data', 'users', id));
        init();
    </script>
</body>
</html>
