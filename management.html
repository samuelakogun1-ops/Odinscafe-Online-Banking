<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdinCore | Sovereign Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains Mono', monospace; background-color: #020617; color: #fbbf24; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(251, 191, 36, 0.2); backdrop-filter: blur(10px); }
        .matrix-input { background: rgba(2, 6, 23, 0.5); border: 1px solid rgba(251, 191, 36, 0.2); color: white; padding: 12px; border-radius: 4px; width: 100%; outline: none; transition: 0.3s; }
        .matrix-input:focus { border-color: #fbbf24; box-shadow: 0 0 10px rgba(251, 191, 36, 0.1); }
        .btn-gold { background: #fbbf24; color: #020617; font-weight: 800; padding: 12px; border-radius: 4px; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; transition: 0.3s; }
        .btn-gold:hover { background: white; transform: translateY(-1px); }
        .btn-gold:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- System Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 border-b border-white/5 pb-6">
            <div>
                <h1 class="text-3xl font-black tracking-tighter italic">ODIN<span class="text-white">_MATRIX</span></h1>
                <div class="flex items-center gap-4 mt-2">
                    <div class="flex items-center gap-2">
                        <div id="statusIndicator" class="w-3 h-3 rounded-full bg-red-600 animate-pulse"></div>
                        <span id="statusLabel" class="text-[9px] font-bold uppercase tracking-widest text-red-500">Node: Offline</span>
                    </div>
                    <button onclick="location.reload()" class="text-[8px] bg-white/5 px-2 py-1 rounded text-white uppercase font-bold hover:bg-white/10">Re-Sync</button>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="forceBoot" class="text-[9px] border border-amber-500/50 px-4 py-2 text-amber-500 font-bold uppercase hover:bg-amber-500 hover:text-black">Force Boot Sequence</button>
                <button onclick="window.location.href='terminal.html'" class="text-[9px] border border-white/20 px-4 py-2 text-white font-bold uppercase hover:bg-white/10">Back</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Entry Terminal -->
            <div class="glass-panel p-6 rounded-lg">
                <h2 class="text-[10px] font-bold uppercase mb-6 text-white border-l-2 border-amber-500 pl-3">Identity Provisioning</h2>
                <form id="provisionForm" class="space-y-4">
                    <input type="text" id="cName" class="matrix-input" placeholder="FULL NAME" required>
                    <input type="number" id="cBalance" class="matrix-input" placeholder="OPENING BALANCE ($)" required>
                    <input type="text" id="cPass" class="matrix-input" placeholder="ACCESS PASSKEY" required>
                    <button type="submit" id="submitBtn" class="btn-gold w-full">Execute Provisioning</button>
                </form>
            </div>

            <!-- Global Registry -->
            <div class="lg:col-span-2 glass-panel p-6 rounded-lg">
                <h2 class="text-[10px] font-bold uppercase mb-6 text-white border-l-2 border-amber-500 pl-3">Active Sovereign Registry</h2>
                <div class="overflow-x-auto min-h-[300px]">
                    <table class="w-full text-left text-[11px]">
                        <thead>
                            <tr class="text-white/30 uppercase tracking-[0.2em] border-b border-white/5">
                                <th class="pb-4 font-normal">Sovereign Identity</th>
                                <th class="pb-4 font-normal">Passkey</th>
                                <th class="pb-4 font-normal">Liquidity</th>
                                <th class="pb-4 font-normal text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="registryBody" class="divide-y divide-white/5">
                            <!-- Data Injected Here -->
                        </tbody>
                    </table>
                    <div id="emptyState" class="text-center py-20 text-white/10 italic text-xs uppercase tracking-widest">
                        System awaiting initial record creation...
                    </div>
                </div>
            </div>
        </div>

        <!-- Debug Log -->
        <div class="mt-8 bg-black/50 p-4 border border-white/5 rounded font-mono text-[9px] text-slate-500">
            <p class="mb-2 text-amber-500/50 uppercase font-bold text-[8px]">Core Node Output Logs:</p>
            <div id="sysLog" class="max-h-20 overflow-y-auto space-y-1"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const log = (msg, color = 'slate-500') => {
            const el = document.getElementById('sysLog');
            el.innerHTML += `<p class="text-${color}">[${new Date().toLocaleTimeString()}] > ${msg}</p>`;
            el.scrollTop = el.scrollHeight;
        };

        let db, auth, appId;

        async function initSystem() {
            try {
                log("Initializing Core Protocols...", "white");
                const config = JSON.parse(__firebase_config);
                appId = typeof __app_id !== 'undefined' ? __app_id : 'odin-core-vault';
                const app = initializeApp(config);
                db = getFirestore(app);
                auth = getAuth(app);

                const cred = await signInAnonymously(auth);
                log("Sovereign Auth Successful.", "green-500");
                
                document.getElementById('statusIndicator').className = "w-3 h-3 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]";
                document.getElementById('statusLabel').innerText = "Node: Online";
                document.getElementById('statusLabel').className = "text-[9px] font-bold uppercase tracking-widest text-green-500";
                
                syncRegistry();
            } catch (err) {
                log(`Critical Init Failure: ${err.message}`, "red-500");
            }
        }

        function syncRegistry() {
            log("Establishing Real-time Data Link...", "white");
            const col = collection(db, 'artifacts', appId, 'public', 'data', 'users');
            onSnapshot(col, (snap) => {
                const body = document.getElementById('registryBody');
                const empty = document.getElementById('emptyState');
                body.innerHTML = '';
                empty.style.display = snap.empty ? 'block' : 'none';

                snap.forEach((record) => {
                    const data = record.data();
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-white/5";
                    tr.innerHTML = `
                        <td class="py-4 font-bold text-white uppercase italic">${data.name}</td>
                        <td class="py-4 font-mono text-white/40">${data.password}</td>
                        <td class="py-4 text-amber-500 font-bold">$${Number(data.balance).toLocaleString()}</td>
                        <td class="py-4 text-right">
                            <button onclick="terminate('${record.id}')" class="text-[8px] border border-red-500/30 px-2 py-1 text-red-500 font-black hover:bg-red-500 hover:text-white transition-all uppercase">Terminate</button>
                        </td>
                    `;
                    body.appendChild(tr);
                });
                log(`Registry Synced. Records: ${snap.size}`, "green-500");
            });
        }

        document.getElementById('provisionForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "PROVISIONING...";

            try {
                const payload = {
                    name: document.getElementById('cName').value,
                    balance: document.getElementById('cBalance').value,
                    password: document.getElementById('cPass').value,
                    timestamp: new Date().toISOString()
                };

                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'users'), payload);
                log(`Identity Provisioned: ${payload.name}`, "green-500");
                document.getElementById('provisionForm').reset();
            } catch (err) {
                log(`Provisioning Failed: ${err.message}`, "red-500");
                alert("Database Locked. Click 'Force Boot Sequence' and try again.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Execute Provisioning";
            }
        };

        window.terminate = async (id) => {
            if(confirm("Terminate Identity?")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', id));
                log("Identity Purged.", "amber-500");
            }
        };

        document.getElementById('forceBoot').onclick = initSystem;

        // Auto-run
        initSystem();
    </script>
</body>
</html>
