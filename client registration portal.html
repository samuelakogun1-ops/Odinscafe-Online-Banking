<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdinCore | Enrollment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: white; display: flex; align-items: center; justify-center; min-height: 100vh; margin: 0; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-field { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
        .input-field:focus { border-color: #fbbf24; outline: none; }
    </style>
</head>
<body class="p-6">
    <div class="glass w-full max-w-md p-10 rounded-[3rem] shadow-2xl mx-auto">
        <div class="text-center mb-10">
            <h2 class="text-2xl font-black italic tracking-tighter uppercase">MEMBERSHIP<span class="text-amber-500">APPLY</span></h2>
        </div>
        <form onsubmit="event.preventDefault(); window.location.href='login.html';" class="space-y-6">
            <input type="text" placeholder="Full Name" class="input-field w-full rounded-2xl py-4 px-6 text-sm font-bold text-white" required>
            <input type="email" placeholder="Email Address" class="input-field w-full rounded-2xl py-4 px-6 text-sm font-bold text-white" required>
            <input type="password" placeholder="Passkey" class="input-field w-full rounded-2xl py-4 px-6 text-sm font-bold text-white" required>
            <button type="submit" class="w-full bg-amber-500 text-black font-black py-5 rounded-2xl text-[10px] uppercase tracking-[0.2em]">Submit Application</button>
        </form>
    </div>
</body>
</html>
