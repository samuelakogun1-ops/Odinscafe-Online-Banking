<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdinCore | Sovereign Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #fbbf24; font-family: monospace; }
        .panel { background: rgba(15, 23, 42, 0.9); border: 1px solid #fbbf2433; padding: 20px; border-radius: 8px; }
        input { background: #000; border: 1px solid #fbbf2455; color: #fff; padding: 10px; width: 100%; margin-bottom: 10px; outline: none; }
        button { background: #fbbf24; color: #000; font-weight: bold; padding: 12px; width: 100%; border-radius: 4px; cursor: pointer; text-transform: uppercase; }
        tr { border-bottom: 1px solid #ffffff11; }
        th { text-align: left; color: #ffffff55; font-size: 10px; text-transform: uppercase; padding: 10px 0; }
        td { padding: 15px 0; font-size: 12px; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 style="font-size: 24px; font-weight: 900 italic;">ODIN_MATRIX</h1>
            <div id="status" style="color: red; font-size: 10px; font-weight: bold;">[ NODE: CONNECTING... ]</div>
        </div>

        <div class="grid md:grid-cols-3 gap-6">
            <div class="panel">
                <h2 style="font-size: 12px; margin-bottom: 20px; color: #fff;">PROVISION IDENTITY</h2>
                <form id="f">
                    <input type="text" id="n" placeholder="NAME" required>
                    <input type="number" id="b" placeholder="BALANCE" required>
                    <input type="text" id="p" placeholder="PASSWORD" required>
                    <button type="submit" id="s">EXECUTE</button>
                </form>
            </div>

            <div class="md:col-span-2 panel">
                <table style="width: 100%;">
                    <thead><tr><th>Identity</th><th>Key</th><th>Liquidity</th><th></th></tr></thead>
                    <tbody id="t"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const cfg = JSON.parse(__firebase_config);
        const app = initializeApp(cfg);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const aid = typeof __app_id !== 'undefined' ? __app_id : 'odin-core-vault';

        // FORCE CONNECTION
        signInAnonymously(auth).then(() => {
            document.getElementById('status').style.color = 'lime';
            document.getElementById('status').innerText = '[ NODE: ONLINE ]';
            
            const col = collection(db, 'artifacts', aid, 'public', 'data', 'users');
            
            // LIVE SYNC
            onSnapshot(col, (s) => {
                const tbody = document.getElementById('t');
                tbody.innerHTML = '';
                s.forEach((d) => {
                    const r = d.data();
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="color:#fff; font-weight:bold;">${r.name}</td>
                        <td style="opacity:0.5;">${r.password}</td>
                        <td style="color:#fbbf24;">$${Number(r.balance).toLocaleString()}</td>
                        <td style="text-align:right;"><button onclick="window.del('${d.id}')" style="background:transparent; color:red; width:auto; padding:0; font-size:9px;">TERMINATE</button></td>
                    `;
                    tbody.appendChild(tr);
                });
            });

            // SAVE DATA
            document.getElementById('f').onsubmit = async (e) => {
                e.preventDefault();
                const btn = document.getElementById('s');
                btn.innerText = 'WORKING...';
                await addDoc(col, {
                    name: document.getElementById('n').value,
                    balance: document.getElementById('b').value,
                    password: document.getElementById('p').value
                });
                document.getElementById('f').reset();
                btn.innerText = 'EXECUTE';
            };
        });

        window.del = (id) => deleteDoc(doc(db, 'artifacts', aid, 'public', 'data', 'users', id));
    </script>
</body>
</html>
